<!DOCTYPE html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Lipumäng – Õpi maailma lippe!</title>

    <!-- SEO meta -->
    <meta name="description" content="Lipumäng on eestikeelne mäng lastele, kus saab õppida maailma riikide lippe. Tasuta, reklaamivaba ja lõbus!" />
    <meta name="keywords" content="lipumäng, õpi lippe, maailma lipud, lipud lastele, riikide lipud eesti keeles, lippude õppimine, lastemäng" />
    <meta name="author" content="Pisak OÜ" />

    <!-- Open Graph -->
    <meta property="og:title" content="Lipumäng – Õpi maailma lippe!" />
    <meta property="og:description" content="Lipumäng on eestikeelne mäng lastele, kus saab õppida maailma riikide lippe. Tasuta, reklaamivaba ja lõbus!" />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:url" content="https://lipumang.ee" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="et_EE" />

    <!-- Favicons & icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">
    <link rel="manifest" href="/manifest.json">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        font-family: 'Nunito', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior: none;
      }
      button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
      button:active { transform: scale(0.96); }
      img { user-select: none; -webkit-user-drag: none; }
      .expert-flag-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.6rem; justify-items: center; }
      @media (min-width: 520px) {
        .expert-flag-grid { grid-template-columns: repeat(4, 1fr); }
      }
      @keyframes popIn {
        0% { transform: scale(0.3); opacity: 0; }
        70% { transform: scale(1.08); }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes fadeInOut {
        0% { opacity: 0; }
        15% { opacity: 1; }
        75% { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes confettiFall {
        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(85vh) rotate(720deg); opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
